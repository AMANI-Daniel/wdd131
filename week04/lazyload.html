    <title>Lazy loading</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>
<body>
    <main>
        <h1>Lazy Loading</h1>
        <picture>
            <img src="images/a.webp" alt="The first image" loading="lazy" width="400" height="600">
            <img src="images/b.webp" alt="The second image" loading="lazy" width="400" height="600">
            <img src="images/c.webp" alt="The third image" loading="lazy" width="400" height="600">
            <img src="images/d.webp" alt="The fourth image" loading="lazy" width="400" height="600">
            <img src="images/e.webp" alt="The fifth image" loading="lazy" width="400" height="600">
            <img src="images/f.webp" alt="The sixth image" loading="lazy" width="400" height="600">
        </picture>
    </main>
    <footer>

    </footer>
